name: Pytest
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_ETAG_TIMEOUT: "120"
      HF_HUB_DOWNLOAD_TIMEOUT: "120"

    steps:
      # System deps (platform-specific)
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libcairo2-dev libgirepository1.0-dev
          version: 1.0

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cairo gobject-introspection

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          # gobject-introspection wheels on Windows bundle their own libs;
          # if your build needs the native libs, swap this for a vcpkg/msys2 step.
          echo "No extra system packages required (using wheel-bundled libs)"

      # Checkout & toolchain
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7

      # HF cache
      - name: Set HF_HOME
        shell: bash
        run: |
          echo "HF_HOME=${RUNNER_TEMP}/.hf" >> "$GITHUB_ENV"
          mkdir -p "${RUNNER_TEMP}/.hf"

      - name: Cache Hugging Face hub
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/.hf
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: hf-${{ runner.os }}-

      # Test .env
      - name: Create test .env
        shell: bash
        run: |
          printf "OPENAI_API_KEY=test-dummy\n" > .env

      # Install
      - name: Install (frozen) – Linux / macOS
        if: runner.os != 'Windows'
        run: uv sync --frozen --all-extras --group dev

      - name: Install (frozen) – Windows (no mediapipe)
        if: runner.os == 'Windows'
        run: uv sync --frozen --extra local_vision --extra yolo_vision --group dev

      # Prefetch HF dataset
      - name: Prefetch HF dataset (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          .venv/bin/python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='pollen-robotics/reachy-mini-emotions-library',
              repo_type='dataset',
              etag_timeout=120,
              max_workers=4,
          )
          "

      - name: Prefetch HF dataset (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv/Scripts/python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='pollen-robotics/reachy-mini-emotions-library',
              repo_type='dataset',
              etag_timeout=120,
              max_workers=4,
          )
          "

      # Tests
      - name: Run tests (Linux / macOS)
        if: runner.os != 'Windows'
        run: .venv/bin/pytest -q

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: .venv/Scripts/pytest -q
